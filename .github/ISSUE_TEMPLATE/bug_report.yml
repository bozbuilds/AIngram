name: Bug report
description: Report something that is broken or incorrect
labels: ['bug']
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, in one short paragraph.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: >-
        Steps to reproduce (commands, code snippet). Include Python version,
        OS, and package version if known (`pip show aingram`).
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / logs
    validations:
      required: true
